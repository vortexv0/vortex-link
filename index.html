<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>✦ vortex</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0a0f;
        color: #fff;
        font-family: 'Inter', system_ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        overflow: hidden;
        position: relative;
    }

    /* Анимированный фон с частицами */
    #particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .container {
        max-width: 420px;
        width: 100%;
        position: relative;
        z-index: 1;
    }

    .profile {
        text-align: center;
        margin-bottom: 40px;
    }

    .avatar {
        width: 110px;
        height: 110px;
        border-radius: 9999px;
        border: 3px solid #a855f7;
        object-fit: cover;
        margin-bottom: 20px;
        box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
        transition: transform 0.3s ease;
    }

    .avatar:hover {
        transform: scale(1.03);
    }

    .name {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .bio {
        font-size: 15px;
        color: #a1a1aa;
        line-height: 1.5;
    }

    .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(18, 18, 24, 0.85);
        border: 1px solid #27272a;
        padding: 18px 24px;
        border-radius: 16px;
        text-decoration: none;
        color: white;
        font-weight: 500;
        transition: all 0.2s ease;
        backdrop-filter: blur(10px);
    }

    .link:hover {
        border-color: #a855f7;
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    }

    .link:active {
        transform: scale(0.985);
    }

    .link-content {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .link-text {
        font-size: 16px;
    }

    .link-arrow {
        font-size: 20px;
        color: #a855f7;
        transition: transform 0.2s ease;
    }

    .link:hover .link-arrow {
        transform: translateX(6px);
    }
</style>
</head>
<body>

    <!-- Анимированный фон с частицами -->
    <canvas id="particles"></canvas>

    <div class="container">
        <!-- Профиль -->
        <div class="profile">
            <img src="https://pbs.twimg.com/profile_images/2070186261399195648/QsO8VULV.jpg" 
                 alt="✦ vortex" class="avatar">
            <h1 class="name">✦ vortex</h1>
            <p class="bio">Web3 Nomad ⋄ AI Visionary ⋄ At the edge of agents</p>
        </div>

        <!-- Ссылки -->
        <div class="links">
            <a href="https://x.com/omnivortex1" target="_blank" class="link">
                <div class="link-content">
                    <span style="font-size:22px">𝕏</span>
                    <span class="link-text">X / Twitter</span>
                </div>
                <span class="link-arrow">→</span>
            </a>

            <a href="#" class="link" onclick="copyLink('t.me/your_telegram')">
                <div class="link-content">
                    <span style="font-size:20px">📱</span>
                    <span class="link-text">Telegram • Personal</span>
                </div>
                <span class="link-arrow">→</span>
            </a>

            <a href="#" class="link" onclick="copyLink('t.me/your_crypto_channel')">
                <div class="link-content">
                    <span style="font-size:20px">📡</span>
                    <span class="link-text">Crypto Universe • Alpha Calls</span>
                </div>
                <span class="link-arrow">→</span>
            </a>

            <a href="https://substack.com/@omnivortex1" target="_blank" class="link">
                <div class="link-content">
                    <span style="font-size:20px">📝</span>
                    <span class="link-text">Blog • Substack</span>
                </div>
                <span class="link-arrow">→</span>
            </a>
        </div>
    </div>

<script>
// ==================== АНИМИРОВАННЫЕ ЧАСТИЦЫ ====================
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.5 + 1;
        this.speedX = Math.random() * 0.6 - 0.3;
        this.speedY = Math.random() * 0.6 - 0.3;
        this.opacity = Math.random() * 0.6 + 0.3;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    }

    draw() {
        ctx.fillStyle = `rgba(168, 85, 247, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    particles = [];
    const numberOfParticles = Math.floor((canvas.width * canvas.height) / 12000);
    for (let i = 0; i < numberOfParticles; i++) {
        particles.push(new Particle());
    }
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();

        // Лёгкое соединение частиц
        for (let j = i; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 120) {
                ctx.strokeStyle = `rgba(168, 85, 247, ${0.08 * (1 - distance / 120)})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();

// ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
function copyLink(text) {
    navigator.clipboard.writeText(text).then(() => {
        const originalText = event.target.innerText;
        event.target.style.color = '#a855f7';
        
        setTimeout(() => {
            event.target.style.color = '';
        }, 1200);
    }).catch(() => {
        alert('Ссылка: ' + text);
    });
}

// Клик по аватарке
document.querySelector('.avatar').addEventListener('click', function() {
    this.style.transform = 'scale(0.9)';
    setTimeout(() => {
        this.style.transform = 'scale(1)';
    }, 200);
});
</script>
</body>
