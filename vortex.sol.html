<script>
// ═══════════════════════════════════════════════════════
//  BOOT SEQUENCE
// ═══════════════════════════════════════════════════════
(async () => {
  const B = document.getElementById('boot');
  const d = ms => new Promise(r => setTimeout(r, ms));

  const lines = [
    ['>','VORTEX.PROTOCOL v3.1',' — QUANTUM LINK',''],
    ['>','SPAWNING 5-ARM LOGARITHMIC VORTEX','........','ok'],
    ['>','INITIALIZING AGENT SWARM FIELD','...........','ok'],
    ['>','NEURAL GRAVITY LENS ONLINE','.............','ok'],
    ['>','VOID SINGULARITY STABLE','................','ok'],
    ['>','ALL SYSTEMS NOMINAL','','EDGE'],
  ];

  let skip = false;
  const onSkip = () => { skip = true; };
  window.addEventListener('click', onSkip, {once:true});
  window.addEventListener('keydown', onSkip, {once:true});
  window.addEventListener('touchstart',onSkip, {once:true,passive:true});

  for (const [pfx, main, dots, status] of lines) {
    if (skip) break;
    const el = document.createElement('div');
    el.className = 'bl';
    B.appendChild(el);
    let txt = pfx + ' ';
    el.textContent = txt;
    for (const ch of main) {
      if (skip) break;
      txt += ch;
      el.textContent = txt;
      await d(14);
    }
    if (skip) break;
    txt += dots;
    el.textContent = txt;
    await d(55);
    if (status) {
      const label = status === 'ok' ? '[OK]' : `[${status}]`;
      el.innerHTML = el.textContent + ` <span class="bok">${label}</span>`;
    }
    await d(85);
  }

  await d(280);
  B.classList.add('out');
  setTimeout(() => B.style.display = 'none', 920);
})();

// ==================== PARTICLES ====================
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let mouse = { x: null, y: null };

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.1 + 0.7;
        this.speedX = Math.random() * 0.35 - 0.18;
        this.speedY = Math.random() * 0.35 - 0.18;
        this.opacity = Math.random() * 0.45 + 0.25;
    }

    update() {
        if (mouse.x && mouse.y) {
            const dx = this.x - mouse.x;
            const dy = this.y - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 130 && dist > 0) {
                this.x += (dx / dist) * 2.8;
                this.y += (dy / dist) * 2.8;
            }
        }
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    }

    draw() {
        ctx.fillStyle = `rgba(168, 85, 247, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    particles = [];
    const count = Math.floor((canvas.width * canvas.height) / 11500);
    for (let i = 0; i < count; i++) particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
    }
    requestAnimationFrame(animate);
}

initParticles();
animate();
</script>
